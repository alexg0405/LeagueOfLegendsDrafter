name: Update public meta data

on:
  workflow_dispatch:
  schedule:
    - cron: '23 10 * * *'

permissions:
  contents: write

jobs:
  update-public-meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run meta:update:mobalytics

      - name: Commit refreshed public meta
        run: |
          if git diff --quiet -- src/shared/data/publicMetaStatsSeed.json src/shared/data/publicSynergyStatsSeed.json src/renderer/public/data; then
            echo "No public meta changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/shared/data/publicMetaStatsSeed.json src/shared/data/publicSynergyStatsSeed.json src/renderer/public/data
          git commit -m "Update public meta data"
          git push
